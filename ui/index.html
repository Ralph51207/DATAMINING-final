<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heart Disease Analytics Workbench</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>Cardio Analytics</h1>
        <p>Clinical Risk Workbench</p>
      </div>
      <nav class="menu">
        <button class="menu-btn active" data-section="graphSection">Patient Graph</button>
        <button class="menu-btn" data-section="datasetSection">Dataset</button>
        <button class="menu-btn" data-section="outputsSection">Notebook Outputs</button>
        <button class="menu-btn" data-section="logSection">Run Log</button>
      </nav>
      <div class="sidebar-actions">
        <button id="runBtn" class="btn primary">Run Pipeline</button>
        <a class="btn" href="/reports/Lastnames_CCS230_Finals.pdf">Report PDF</a>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div id="statusBar" class="status-bar" aria-live="polite">
          <div class="status-pill" data-status="idle">IDLE</div>
          <div class="status-text">Ready to run.</div>
        </div>
        <div class="progress">
          <div id="progressFill" class="progress-fill" style="width: 0%"></div>
        </div>
      </header>

      <section id="graphSection" class="panel">
        <div class="panel-head">
          <h2>Patient Data Graph</h2>
          <label class="viz-menu-label">Visualization
            <select id="vizMenu">
              <option value="auto">Auto (Recommended)</option>
              <option value="scatter">Scatter Plot</option>
              <option value="bar">Bar Chart</option>
              <option value="box">Box Plot</option>
              <option value="histogram">Histogram</option>
              <option value="heatmap">Correlation Heatmap</option>
            </select>
          </label>
        </div>
        <div class="panel-head">
          <div class="plot-controls">
            <label>X-axis
              <select id="xSelect"></select>
            </label>
            <label>Y-axis
              <select id="ySelect"></select>
            </label>
            <label>Color By
              <select id="colorSelect"></select>
            </label>
            <label>Aggregation
              <select id="aggSelect">
                <option value="rate">Disease Rate</option>
                <option value="count">Count</option>
              </select>
            </label>
          </div>
        </div>
        <div class="plot-wrap">
          <div id="chartContainer" class="plotly-host"></div>
          <div id="plotFallback" class="muted">Dataset columns needed for plotting were not found.</div>
        </div>
        <div id="validationMessage" class="validation-message"></div>
        <div id="chartDescription" class="summary"></div>
        <div id="plotLegend" class="plot-legend"></div>
        <div id="steps" class="steps"></div>
      </section>

      <section id="datasetSection" class="panel">
        <div class="panel-head">
          <h2>Dataset Table</h2>
          <div id="datasetMeta" class="meta"></div>
        </div>
        <div class="table-wrap">
          <table id="datasetTable">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="outputsSection" class="panel">
        <div class="panel-head">
          <h2>Notebook Outputs</h2>
          <div class="chips" id="artifactFilters">
            <button class="chip active" data-filter="all">All</button>
            <button class="chip" data-filter="chart">Charts</button>
            <button class="chip" data-filter="table">Tables</button>
            <button class="chip" data-filter="report">Reports</button>
          </div>
        </div>
        <div class="outputs-layout">
          <div id="artifactGrid" class="artifact-list"></div>
          <div class="preview-pane">
            <h3 id="previewTitle">Preview</h3>
            <div id="previewContent" class="preview-content">Select an output file.</div>
          </div>
        </div>
      </section>

      <section id="logSection" class="panel">
        <h2>Run Log</h2>
        <pre id="logOutput" class="log-output">Waiting for a run...</pre>
      </section>
    </main>
  </div>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="/ui/app.js"></script>
</body>
</html>
